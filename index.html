<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<title>To do</title>
<meta name="theme-color" content="#0A0A0F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="To do">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0A0A0F; --bg-2: #12121A; --surface: #1A1A24; --surface-soft: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.06); --border-strong: rgba(255,255,255,0.12);
    --text: #E8E8EF; --text-2: #9090A0; --text-3: #5A5A6A;
    --brand-a: #4F8CFF; --brand-b: #A87BFF;
    --grad: linear-gradient(135deg, #4F8CFF, #A87BFF);
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #F2F2F7; --bg-2: #FFFFFF; --surface: #FFFFFF; --surface-soft: rgba(0,0,0,0.03);
      --border: rgba(0,0,0,0.06); --border-strong: rgba(0,0,0,0.12);
      --text: #000000; --text-2: #6E6E73; --text-3: #A0A0A8;
    }
  }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    background-image:
      radial-gradient(ellipse at top left, rgba(79,140,255,0.08), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(168,123,255,0.05), transparent 50%);
    -webkit-font-smoothing: antialiased; overscroll-behavior: none;
  }
  @media (prefers-color-scheme: light) {
    body { background-image: none; }
  }
  #root { max-width: 480px; margin: 0 auto; min-height: 100%; position: relative; }

  .app { display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; }
  .header { padding: max(20px, env(safe-area-inset-top)) 20px 12px; }
  .header .greeting { font-size: 13px; color: var(--text-2); margin-bottom: 2px; }
  .header .title-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
  .header .stats { font-size: 12px; color: var(--text-2); margin-top: 6px; }
  .icon-btn {
    width: 36px; height: 36px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; display: inline-flex; align-items: center; justify-content: center;
    color: var(--text-2); font-size: 17px; cursor: pointer; flex-shrink: 0;
  }
  .icon-btn:active { transform: scale(0.94); }

  .content { flex: 1; overflow-y: auto; padding: 0 20px 120px; -webkit-overflow-scrolling: touch; }
  .section-title { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--text-3); margin: 18px 0 10px; }

  /* Task card */
  .task { background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 10px; cursor: pointer; }
  .task:active { transform: scale(0.99); }
  .task.done { opacity: 0.5; }
  .task.done .task-title { text-decoration: line-through; }
  .checkbox { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--text-3);
    flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .checkbox.checked { background: var(--text-2); border-color: var(--text-2); }
  .checkbox.checked::after { content: ""; width: 6px; height: 3px; border-left: 1.5px solid var(--bg);
    border-bottom: 1.5px solid var(--bg); transform: rotate(-45deg) translateY(-1px); }
  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; line-height: 1.3; }
  .task-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 11px; color: var(--text-2); }
  .area-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .context-tag { padding: 2px 7px; background: var(--surface-soft); border-radius: 6px; font-size: 10px; color: var(--text-2); }
  .quick-badge { padding: 2px 6px; background: rgba(255,181,71,0.14); color: #FFB547; border-radius: 6px;
    font-size: 9.5px; font-weight: 600; }
  .waiting-since { font-size: 10.5px; color: var(--text-3); margin-top: 3px; }

  /* Area card */
  .area-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 14px; margin-bottom: 10px; position: relative; overflow: hidden; cursor: pointer; }
  .area-card .bar { position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .area-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .area-name { font-size: 15px; font-weight: 600; }
  .area-count { font-size: 11px; color: var(--text-2); background: var(--surface-soft);
    padding: 2px 9px; border-radius: 100px; }
  .area-meta { display: flex; gap: 14px; font-size: 11px; color: var(--text-2); margin-top: 4px; }
  .area-meta strong { color: var(--text); }

  /* Project card */
  .project { background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px; margin-bottom: 10px; cursor: pointer; }
  .project-header { display: flex; align-items: center; gap: 10px; }
  .project-title { font-size: 14px; font-weight: 600; }
  .project-meta { font-size: 11px; color: var(--text-2); margin-top: 2px; }
  .project-next { margin-top: 8px; padding: 8px 10px; background: var(--surface-soft); border-radius: 8px;
    font-size: 11.5px; color: var(--text-2); border-left: 2px solid var(--brand-a); }
  .project-next strong { color: var(--text); }
  .ring { width: 30px; height: 30px; flex-shrink: 0; }

  /* Bottom nav */
  .nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 480px; margin: 0 auto;
    display: flex; padding: 10px 12px max(18px, env(safe-area-inset-bottom)); gap: 4px;
    background: color-mix(in srgb, var(--bg) 82%, transparent);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border); z-index: 50; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    font-size: 9.5px; color: var(--text-3); cursor: pointer; padding: 4px 0; }
  .nav-item.active { color: var(--text); }
  .nav-item svg { width: 22px; height: 22px; }

  .fab { position: fixed; bottom: calc(78px + env(safe-area-inset-bottom)); right: max(20px, calc(50% - 240px + 20px));
    width: 56px; height: 56px; border-radius: 50%; background: var(--grad); color: #fff;
    font-size: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer;
    box-shadow: 0 8px 24px rgba(79,140,255,0.4); z-index: 49; border: none; }
  .fab:active { transform: scale(0.94); }

  /* Empty state */
  .empty { text-align: center; padding: 70px 24px; color: var(--text-2); }
  .empty .ico { font-size: 38px; opacity: 0.5; margin-bottom: 12px; }
  .empty h3 { font-size: 17px; color: var(--text); margin-bottom: 6px; }
  .empty p { font-size: 13px; line-height: 1.5; }

  /* Inbox */
  .quick-row { display: flex; gap: 8px; margin: 8px 0 4px; }
  .quick-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 13px; font-size: 14px; color: var(--text); font-family: inherit; }
  .quick-input::placeholder { color: var(--text-3); }
  .send-btn { width: 46px; border: none; border-radius: 12px; background: var(--grad); color: #fff;
    font-size: 18px; cursor: pointer; }
  .send-btn:disabled { opacity: 0.4; }
  .banner { background: linear-gradient(135deg, rgba(79,140,255,0.15), rgba(168,123,255,0.15));
    border: 1px solid rgba(79,140,255,0.25); border-radius: 14px; padding: 14px; margin: 10px 0; }
  .banner-title { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
  .banner-text { font-size: 11.5px; color: var(--text-2); line-height: 1.5; }
  .inbox-item { background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px; margin-bottom: 8px; cursor: pointer; }
  .inbox-text { font-size: 14px; line-height: 1.4; }
  .inbox-time { font-size: 10.5px; color: var(--text-3); margin-top: 4px; }

  /* Calendar */
  .cal-nav { display: flex; align-items: center; justify-content: space-between; margin: 12px 0; }
  .cal-nav button { background: none; border: none; color: var(--text-2); font-size: 18px; cursor: pointer; padding: 6px 10px; }
  .cal-nav .m { font-size: 15px; font-weight: 600; }
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
  .cal-lbl { font-size: 9px; color: var(--text-3); text-align: center; text-transform: uppercase;
    letter-spacing: 0.08em; padding: 6px 0; font-weight: 600; }
  .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 13px; border-radius: 9px; cursor: pointer; position: relative; }
  .cal-day.muted { color: var(--text-3); }
  .cal-day.sel { background: var(--surface); }
  .cal-day.today { background: var(--grad); color: #fff; font-weight: 700; }
  .cal-dots { display: flex; gap: 2px; margin-top: 2px; height: 3px; }
  .cal-dot { width: 3px; height: 3px; border-radius: 50%; }

  /* Sheet / modal */
  .scrim { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: flex;
    align-items: flex-end; justify-content: center; }
  .sheet { background: var(--bg-2); width: 100%; max-width: 480px; max-height: 94vh; border-radius: 22px 22px 0 0;
    display: flex; flex-direction: column; overflow: hidden; animation: up 0.25s ease; }
  @keyframes up { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet-full { border-radius: 0; max-height: 100vh; height: 100dvh; }
  .grab { width: 36px; height: 5px; background: var(--text-3); border-radius: 100px; margin: 8px auto; opacity: 0.5; }

  /* Flow */
  .flow { display: flex; flex-direction: column; height: 100dvh; padding: max(16px,env(safe-area-inset-top)) 20px max(16px,env(safe-area-inset-bottom)); }
  .progress { display: flex; gap: 4px; margin: 8px 0 24px; }
  .pdot { height: 3px; flex: 1; background: var(--border-strong); border-radius: 100px; }
  .pdot.on { background: var(--grad); }
  .step-label { font-size: 11px; color: var(--text-3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
  .question { font-size: 23px; font-weight: 600; line-height: 1.25; margin-bottom: 8px; }
  .hint { font-size: 13px; color: var(--text-2); line-height: 1.5; margin-bottom: 22px; }
  .ta { width: 100%; background: var(--surface); border: 1px solid var(--border-strong); border-radius: 12px;
    padding: 14px; font-size: 15px; color: var(--text); font-family: inherit; resize: none; }
  .flow-body { flex: 1; overflow-y: auto; }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option { background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 13px 14px; font-size: 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .option.sel { border-color: rgba(79,140,255,0.5); background: rgba(79,140,255,0.08); }
  .option .odot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .option .check { margin-left: auto; color: var(--brand-a); }
  .actions { display: flex; gap: 10px; padding-top: 16px; }
  .btn { flex: 1; padding: 15px; border-radius: 12px; font-size: 15px; font-weight: 600; text-align: center;
    border: 1px solid var(--border); background: var(--surface); color: var(--text-2); cursor: pointer; }
  .btn-primary { background: var(--grad); color: #fff; border: none; }
  .btn:disabled { opacity: 0.5; }

  /* Edit form */
  .form { padding: 4px 20px 30px; overflow-y: auto; }
  .form h2 { font-size: 18px; font-weight: 700; margin: 8px 0 16px; }
  .field { margin-bottom: 14px; }
  .field label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-3); display: block; margin-bottom: 6px; }
  .field input, .field textarea, .field select { width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px; font-size: 14px; color: var(--text); font-family: inherit; }
  .field textarea { resize: vertical; min-height: 54px; }
  .row2 { display: flex; gap: 10px; }
  .row2 .field { flex: 1; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .timeline { margin-top: 8px; }
  .tl-item { display: flex; gap: 10px; padding: 7px 0; }
  .tl-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--brand-a); margin-top: 5px; flex-shrink: 0; }
  .tl-text { font-size: 13px; }
  .tl-time { font-size: 11px; color: var(--text-3); }
  .danger { color: #FF6B6B; }
  .pill-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 4px 0 14px; }
  .pill { padding: 7px 14px; border-radius: 100px; font-size: 13px; background: var(--surface);
    border: 1px solid var(--border); color: var(--text-2); cursor: pointer; }
  .pill.on { background: var(--grad); color: #fff; border: none; }
  .sync-badge { font-size: 10px; padding: 3px 8px; border-radius: 100px; background: var(--surface-soft); color: var(--text-3); }
  .sync-badge.on { color: #34C77B; }
</style>
</head>
<body>
<div id="root"></div>

<!-- ====== CONFIGURACIÓN DE BASE DE DATOS EN LA NUBE (opcional) ======
     Para sincronizar entre tu celular y tu compu, crea un proyecto gratis en supabase.com,
     corre el SQL de supabase-schema.sql, y pega aquí tus 2 claves. Mientras estén vacías,
     la app guarda solo en este navegador.  -->
<script>
  window.SUPABASE_URL = "";      // ej. "https://xxxx.supabase.co"
  window.SUPABASE_ANON_KEY = ""; // tu "anon public key"
</script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script id="app">
const {
  useState,
  useEffect,
  useRef,
  useMemo
} = React;
const uid = () => crypto.randomUUID ? crypto.randomUUID() : 'id-' + Math.random().toString(36).slice(2);
const startOfDay = d => {
  const x = new Date(d);
  x.setHours(0, 0, 0, 0);
  return x;
};
const addDays = (d, n) => {
  const x = startOfDay(d);
  x.setDate(x.getDate() + n);
  return x;
};
const iso = d => d ? new Date(d).toISOString() : null;
const isSameDay = (a, b) => a && b && startOfDay(a).getTime() === startOfDay(b).getTime();
const isToday = d => d && isSameDay(new Date(d), new Date());
const cap = s => s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
const fmt = (d, opt) => new Intl.DateTimeFormat('es-ES', opt).format(new Date(d));
const daysBetween = d => Math.floor((Date.now() - new Date(d)) / 86400000);
const AREA_PALETTE = [['Trabajo', '#4F8CFF'], ['Familia', '#34C77B'], ['Comunidad', '#A87BFF'], ['Finanzas', '#FFB547'], ['Salud', '#FF6B8A'], ['Casa', '#5ED4D4']];
const CTX_PALETTE = [['@oficina', '#4F8CFF'], ['@computadora', '#A87BFF'], ['@llamadas', '#34C77B'], ['@errands', '#FFB547'], ['@casa', '#FF6B8A']];
const RECURRENCE = [['none', 'No se repite'], ['daily', 'Diario'], ['weekly', 'Semanal'], ['monthly', 'Mensual']];
const COLOR_OPTS = ['#4F8CFF', '#34C77B', '#A87BFF', '#FFB547', '#FF6B8A', '#5ED4D4', '#FF6B6B', '#F7B731', '#45AAF2', '#78E08F', '#FD9644', '#A55EEA'];
function seed() {
  const areas = AREA_PALETTE.map(([name, color]) => ({
    id: uid(),
    name,
    color
  }));
  const contexts = CTX_PALETTE.map(([name, color]) => ({
    id: uid(),
    name,
    color
  }));
  const A = n => areas.find(a => a.name === n)?.id;
  const C = n => contexts.find(c => c.name === n)?.id;
  const projects = [{
    id: uid(),
    name: 'Dashboard ventas',
    outcome: 'Dashboard en producción',
    areaId: A('Trabajo'),
    status: 'active'
  }, {
    id: uid(),
    name: 'Plan de integración comunitaria',
    areaId: A('Comunidad'),
    status: 'active'
  }, {
    id: uid(),
    name: 'Vacaciones familia diciembre',
    areaId: A('Familia'),
    status: 'active'
  }];
  const tasks = [];
  const events = [];
  const today = startOfDay(new Date());
  const T = o => {
    const t = Object.assign({
      id: uid(),
      title: '',
      outcome: null,
      nextAction: null,
      projectId: null,
      contextId: null,
      areaId: null,
      dueDate: null,
      recurrence: 'none',
      status: 'active',
      isWaitingFor: false,
      waitingFrom: null,
      isQuickWin: false,
      isSomeday: false,
      createdAt: iso(new Date()),
      completedAt: null,
      deletedAt: null
    }, o);
    tasks.push(t);
    events.push({
      id: uid(),
      taskId: t.id,
      type: 'created',
      detail: 'Tarea creada',
      timestamp: t.createdAt
    });
    return t;
  };
  T({
    title: 'Revisar PR del módulo de inventario',
    areaId: A('Trabajo'),
    contextId: C('@computadora'),
    dueDate: iso(today)
  });
  T({
    title: 'Llamar al banco sobre la transferencia',
    areaId: A('Finanzas'),
    contextId: C('@llamadas'),
    dueDate: iso(today),
    isQuickWin: true
  });
  T({
    title: 'Confirmar cita con el dentista',
    areaId: A('Salud'),
    contextId: C('@llamadas'),
    dueDate: iso(today),
    isQuickWin: true
  });
  T({
    title: 'Mandar reportes diarios',
    areaId: A('Trabajo'),
    dueDate: iso(today),
    status: 'completed',
    completedAt: iso(new Date())
  });
  const projTasks = (p, total, done, area) => {
    for (let i = 1; i <= total; i++) T({
      title: `${p.name} – tarea ${i}`,
      areaId: area,
      projectId: p.id,
      status: i <= done ? 'completed' : 'active',
      completedAt: i <= done ? iso(addDays(today, -3)) : null,
      createdAt: iso(addDays(today, -(total - i) - 2))
    });
  };
  projTasks(projects[0], 12, 8, A('Trabajo'));
  projTasks(projects[1], 12, 3, A('Comunidad'));
  projTasks(projects[2], 11, 5, A('Familia'));
  T({
    title: 'Acceso al endpoint nuevo de inventarios',
    areaId: A('Trabajo'),
    isWaitingFor: true,
    waitingFrom: 'Samuel',
    createdAt: iso(addDays(today, -3))
  });
  T({
    title: 'Confirmación de apertura de cuenta',
    areaId: A('Finanzas'),
    isWaitingFor: true,
    waitingFrom: 'Banco',
    createdAt: iso(addDays(today, -7))
  });
  T({
    title: 'Cotización de proveedor de empaque',
    areaId: A('Trabajo'),
    isWaitingFor: true,
    waitingFrom: 'Compras / María',
    createdAt: iso(addDays(today, -2))
  });
  T({
    title: 'Reunión de planeación trimestral',
    areaId: A('Trabajo'),
    dueDate: iso(addDays(today, 2))
  });
  T({
    title: 'Cumpleaños mamá – comprar regalo',
    areaId: A('Familia'),
    dueDate: iso(addDays(today, 5))
  });
  T({
    title: 'Aprender a hacer pan de masa madre',
    areaId: A('Familia'),
    isSomeday: true
  });
  T({
    title: 'Idea: dashboard de KPIs por departamento',
    areaId: A('Trabajo'),
    isSomeday: true
  });
  const inbox = ['Investigar opciones de seguro médico para empleados', 'Revisar artículo sobre webhooks', 'Comprar regalo de cumpleaños'].map(rawText => ({
    id: uid(),
    rawText,
    capturedAt: iso(new Date()),
    processed: false
  }));
  return {
    areas,
    contexts,
    projects,
    tasks,
    events,
    inbox
  };
}
const LS_KEY = 'todo-app-data-v1';
const hasCloud = () => !!(window.SUPABASE_URL && window.SUPABASE_ANON_KEY);
let sb = null;
if (hasCloud()) {
  try {
    sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);
  } catch (e) {
    console.warn(e);
  }
}
async function loadData() {
  if (sb) {
    try {
      const {
        data,
        error
      } = await sb.from('app_state').select('data').eq('id', 'main').maybeSingle();
      if (!error && data && data.data) return data.data;
    } catch (e) {
      console.warn('cloud load falló, uso local', e);
    }
  }
  const local = localStorage.getItem(LS_KEY);
  if (local) return JSON.parse(local);
  return seed();
}
let saveTimer = null;
function saveData(data) {
  localStorage.setItem(LS_KEY, JSON.stringify(data));
  if (sb) {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      sb.from('app_state').upsert({
        id: 'main',
        data,
        updated_at: new Date().toISOString()
      }).then(({
        error
      }) => {
        if (error) console.warn('cloud save error', error);
      });
    }, 600);
  }
}
const Icon = ({
  name
}) => {
